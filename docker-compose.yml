version: '3.8'

services:
  web:
    build: .
    container_name: videodownloader-web
    ports:
      - "8000:8000"
    volumes:
      - ./media:/app/media
      - ./db.sqlite3:/app/db.sqlite3
    environment:
      - DEBUG=False
      - ALLOWED_HOSTS=localhost,127.0.0.1
    command: >
      bash -c "python manage.py migrate &&
               python manage.py collectstatic --noinput --clear &&
               gunicorn --bind 0.0.0.0:8000 --workers 4 --timeout 120 videodownloader.wsgi:application"
    restart: unless-stopped

volumes:
  db:
